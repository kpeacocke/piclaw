---
# SPDX-License-Identifier: Apache-2.0
- name: Validate Hailo PCIe presence
  ansible.builtin.shell: lspci | grep -i hailo
  args:
    executable: /bin/bash
  register: validate_lspci
  changed_when: false
  failed_when: validate_lspci.rc != 0

- name: Validate /dev/hailo0 exists
  ansible.builtin.stat:
    path: /dev/hailo0
  register: validate_hailo_dev

- name: Fail if /dev/hailo0 missing
  ansible.builtin.assert:
    that:
      - validate_hailo_dev.stat.exists
    fail_msg: /dev/hailo0 is missing.

- name: Validate Hailo runtime identify command
  ansible.builtin.command: hailortcli fw-control identify
  register: validate_identify
  changed_when: false
  failed_when: validate_identify.rc != 0

- name: Validate Hailo Ollama version endpoint
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/version"
    method: GET
    status_code: 200

- name: Validate selected model is listed
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/tags"
    method: GET
    return_content: true
    status_code: 200
  register: validate_tags

- name: Assert selected model appears in tags
  ansible.builtin.assert:
    that:
      - (validate_tags.json.models | default([]) | map(attribute='name') | list) is contains(hailo_model)
    fail_msg: "Model {{ hailo_model }} not found in backend tags."

- name: Validate proxy endpoint when enabled
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ proxy_port }}/api/tags"
    method: GET
    status_code: 200
  when: use_sanitizer_proxy | bool

- name: Ensure provider config file exists
  ansible.builtin.stat:
    path: "{{ openclaw_config_path }}"
  register: validate_cfg

- name: Assert provider config file exists
  ansible.builtin.assert:
    that:
      - validate_cfg.stat.exists
    fail_msg: OpenClaw provider config file missing at {{ openclaw_config_path }}.

- name: Read OpenClaw provider config
  ansible.builtin.slurp:
    path: "{{ openclaw_config_path }}"
  register: validate_cfg_content

- name: Assert provider URL matches desired value
  ansible.builtin.assert:
    that:
      - (validate_cfg_content.content | b64decode) is search(openclaw_provider_base_url)
    fail_msg: OpenClaw provider base URL mismatch; expected {{ openclaw_provider_base_url }}.

- name: Verify Hailo Ollama service active
  ansible.builtin.systemd:
    name: "{{ hailo_ollama_service_name }}"
    enabled: true
    state: started
  become: true

- name: Verify proxy service active when enabled
  ansible.builtin.systemd:
    name: "{{ hailo_proxy_service_name }}"
    enabled: true
    state: started
  when: use_sanitizer_proxy | bool
  become: true

- name: Verify OpenClaw gateway/process active
  ansible.builtin.shell: |
    systemctl is-active openclaw || \
    systemctl is-active openclaw-gateway || \
    systemctl is-active claw-gateway
  args:
    executable: /bin/bash
  register: validate_openclaw_service
  changed_when: false
  failed_when: validate_openclaw_service.rc != 0
  become: true

- name: Functional chat roundtrip validation
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/chat"
    method: POST
    body_format: json
    body:
      model: "{{ hailo_model }}"
      stream: false
      messages:
        - role: user
          content: "Respond with OK."
    return_content: true
    status_code: 200
    timeout: "{{ chat_smoke_timeout_seconds }}"
  register: validate_chat

- name: Assert functional chat response is non-empty
  ansible.builtin.assert:
    that:
      - (validate_chat.json.message.content | default('') | trim | length) > 0
    fail_msg: Functional chat roundtrip did not return content.
