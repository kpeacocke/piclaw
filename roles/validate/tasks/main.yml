---
# SPDX-License-Identifier: Apache-2.0
- name: Validate Hailo PCIe presence
  ansible.builtin.shell: |
    set -o pipefail
    lspci | grep -i hailo
  args:
    executable: /bin/bash
  register: validate_lspci
  changed_when: false
  failed_when: validate_lspci.rc != 0
  when: openclaw_use_local_backend | bool

- name: Validate /dev/hailo0 exists
  ansible.builtin.stat:
    path: /dev/hailo0
  register: validate_hailo_dev
  when: openclaw_use_local_backend | bool

- name: Fail if /dev/hailo0 missing
  ansible.builtin.assert:
    that:
      - validate_hailo_dev.stat.exists
    fail_msg: /dev/hailo0 is missing.
  when: openclaw_use_local_backend | bool

- name: Validate Hailo runtime identify command
  ansible.builtin.command: hailortcli fw-control identify
  register: validate_identify
  changed_when: false
  failed_when: validate_identify.rc != 0
  when: openclaw_use_local_backend | bool

- name: Validate Hailo Ollama version endpoint
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/version"
    method: GET
    status_code: 200
  when: openclaw_use_local_backend | bool

- name: Validate selected model is listed
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/tags"
    method: GET
    return_content: true
    status_code: 200
  register: validate_tags
  when: openclaw_use_local_backend | bool

- name: Assert selected model appears in tags
  ansible.builtin.assert:
    that:
      - (validate_tags.json.models | default([]) | map(attribute='name') | list) is contains(hailo_runtime_model | default(hailo_model))
    fail_msg: "Model {{ hailo_runtime_model | default(hailo_model) }} not found in backend tags."
  when: openclaw_use_local_backend | bool

- name: Validate proxy endpoint when enabled
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ proxy_port }}/api/tags"
    method: GET
    status_code: 200
  when: openclaw_use_local_backend | bool and use_sanitizer_proxy | bool

- name: Validate external provider URL when external profile is selected
  ansible.builtin.assert:
    that:
      - (openclaw_external_provider_base_url | trim | length) > 0
    fail_msg: openclaw_external_provider_base_url must be set when openclaw_profile is external-power.
  when: not (openclaw_use_local_backend | bool)

- name: Ensure provider config file exists
  ansible.builtin.stat:
    path: "{{ openclaw_config_path }}"
  register: validate_cfg

- name: Assert provider config file exists
  ansible.builtin.assert:
    that:
      - validate_cfg.stat.exists
    fail_msg: OpenClaw provider config file missing at {{ openclaw_config_path }}.

- name: Read OpenClaw provider config
  ansible.builtin.slurp:
    path: "{{ openclaw_config_path }}"
  register: validate_cfg_content

- name: Assert provider URL matches desired value
  ansible.builtin.assert:
    that:
      - (validate_cfg_content.content | b64decode) is search(openclaw_provider_base_url)
    fail_msg: OpenClaw provider base URL mismatch; expected {{ openclaw_provider_base_url }}.

- name: Gather service facts
  ansible.builtin.service_facts:
  become: true

- name: Assert Hailo Ollama service is active
  ansible.builtin.assert:
    that:
      - ansible_facts.services.get(hailo_ollama_service_name ~ '.service', {}).get('state', 'stopped') == 'running'
    fail_msg: "{{ hailo_ollama_service_name }}.service is not running."
  when: openclaw_use_local_backend | bool
  become: true

- name: Assert proxy service is active when enabled
  ansible.builtin.assert:
    that:
      - ansible_facts.services.get(hailo_proxy_service_name ~ '.service', {}).get('state', 'stopped') == 'running'
    fail_msg: "{{ hailo_proxy_service_name }}.service is not running while use_sanitizer_proxy=true."
  when: openclaw_use_local_backend | bool and use_sanitizer_proxy | bool
  become: true

- name: Verify OpenClaw gateway/process active
  ansible.builtin.assert:
    that:
      - >-
        ansible_facts.services.get('openclaw.service', {}).get('state', 'stopped') == 'running'
        or ansible_facts.services.get('openclaw-gateway.service', {}).get('state', 'stopped') == 'running'
        or ansible_facts.services.get('claw-gateway.service', {}).get('state', 'stopped') == 'running'
    fail_msg: >-
      None of openclaw.service, openclaw-gateway.service, or claw-gateway.service are active.
  become: true

- name: Validate OpenClaw gateway reports healthy
  ansible.builtin.command: openclaw health
  become: true
  become_user: "{{ openclaw_validate_user }}"
  environment:
    HOME: "{{ openclaw_validate_user_home }}"
  changed_when: false

- name: Validate OpenClaw gateway status output
  ansible.builtin.command: openclaw status --all
  become: true
  become_user: "{{ openclaw_validate_user }}"
  environment:
    HOME: "{{ openclaw_validate_user_home }}"
  changed_when: false

- name: Functional chat roundtrip validation
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/chat"
    method: POST
    body_format: json
    body:
      model: "{{ hailo_runtime_model | default(hailo_model) }}"
      stream: false
      messages:
        - role: user
          content: "Respond with OK."
    return_content: true
    status_code: 200
    timeout: "{{ chat_smoke_timeout_seconds }}"
  register: validate_chat
  when: openclaw_use_local_backend | bool

- name: Assert functional chat response is non-empty
  ansible.builtin.assert:
    that:
      - (validate_chat.json.message.content | default('') | trim | length) > 0
    fail_msg: Functional chat roundtrip did not return content.
  when: openclaw_use_local_backend | bool
