---
# SPDX-License-Identifier: Apache-2.0
openclaw_profile: local-safe

# Local backend controls (used by local-safe profile)
use_sanitizer_proxy: true
hailo_model: qwen2:1.5b
hailo_bind_host: 127.0.0.1
hailo_port: 8000
proxy_port: 8081

# External provider controls (used by external-power profile)
openclaw_external_provider_base_url: ""

openclaw_use_local_backend: "{{ openclaw_profile == 'local-safe' }}"
openclaw_provider_base_url: >-
  {{
    ('http://127.0.0.1:' ~ proxy_port ~ '/v1')
    if (openclaw_use_local_backend | bool and use_sanitizer_proxy | bool)
    else (
      ('http://127.0.0.1:' ~ hailo_port ~ '/v1')
      if (openclaw_use_local_backend | bool)
      else openclaw_external_provider_base_url
    )
  }}
openclaw_config_path: /etc/openclaw/config.yml
hailo_ollama_service_name: hailo-ollama
hailo_proxy_service_name: hailo-sanitize-proxy
chat_smoke_timeout_seconds: 45
openclaw_validate_user: "{{ pi_user | default(ansible_user | default('pi')) }}"
openclaw_validate_user_home: "/home/{{ openclaw_validate_user }}"
