---
# SPDX-License-Identifier: Apache-2.0
- name: Ensure PCIe Gen 3.0 is configured in config.txt
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^dtparam=pciex1_gen='
    line: dtparam=pciex1_gen=3
    state: present
  when: pcie_gen3_enabled | bool
  register: pcie_gen3_config
  become: true

- name: Reboot after PCIe Gen 3.0 configuration change
  ansible.builtin.reboot:
    msg: Reboot initiated by Ansible after PCIe Gen 3.0 configuration.
    reboot_timeout: 900
    post_reboot_delay: 10
  when: pcie_gen3_config is defined and pcie_gen3_config.changed
  become: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Full upgrade OS packages
  ansible.builtin.apt:
    upgrade: full
  when: run_full_upgrade | bool
  become: true

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - dkms
      - git
      - curl
      - jq
      - python3-venv
      - python3-pip
      - pciutils
    state: present
  become: true

- name: Apply EEPROM updates
  ansible.builtin.command: rpi-eeprom-update -a
  register: eeprom_update
  changed_when: >-
    'updating' in (eeprom_update.stdout | lower) or
    'update applied' in (eeprom_update.stdout | lower)
  become: true

- name: Check whether reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot after base upgrade or EEPROM update
  ansible.builtin.reboot:
    msg: Reboot initiated by Ansible after baseline upgrade.
    reboot_timeout: 900
    post_reboot_delay: 10
  when: reboot_required.stat.exists or eeprom_update.changed
  become: true

- name: Verify Hailo PCIe device is detected
  ansible.builtin.shell: |
    set -o pipefail
    lspci | grep -i hailo
  args:
    executable: /bin/bash
  register: hailo_lspci
  changed_when: false
  failed_when: hailo_lspci.rc != 0
