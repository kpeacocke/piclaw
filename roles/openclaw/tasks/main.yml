---
# SPDX-License-Identifier: Apache-2.0
- name: Validate claw_flavor contains only safe characters
  ansible.builtin.assert:
    that:
      - claw_flavor is match('^[a-zA-Z0-9_-]+$')
    fail_msg: "claw_flavor '{{ claw_flavor }}' contains invalid characters. Only alphanumeric, hyphen, and underscore are allowed."

- name: Validate OpenClaw profile selection
  ansible.builtin.assert:
    that:
      - openclaw_profile in ['local-safe', 'external-power']
    fail_msg: "openclaw_profile must be one of: local-safe, external-power."

- name: Validate hailo_model contains only safe characters
  ansible.builtin.assert:
    that:
      - hailo_model is match('^[a-zA-Z0-9_./:@-]+$')
    fail_msg: "hailo_model '{{ hailo_model }}' contains invalid characters."

- name: Validate selected provider name contains only safe characters
  ansible.builtin.assert:
    that:
      - openclaw_provider_name is match('^[a-zA-Z0-9_-]+$')
    fail_msg: "openclaw_provider_name '{{ openclaw_provider_name }}' contains invalid characters."

- name: Validate selected provider model contains only safe characters
  ansible.builtin.assert:
    that:
      - openclaw_selected_model is match('^[a-zA-Z0-9_./:@-]+$')
    fail_msg: "openclaw_selected_model '{{ openclaw_selected_model }}' contains invalid characters."

- name: Validate external provider URL when external profile is selected
  ansible.builtin.assert:
    that:
      - (openclaw_external_provider_base_url | trim | length) > 0
    fail_msg: "openclaw_external_provider_base_url must be set when openclaw_profile is external-power."
  when: not (openclaw_use_local_backend | bool)

- name: Validate external provider API key env var name when external profile is selected
  ansible.builtin.assert:
    that:
      - openclaw_external_provider_api_key_env is match('^[A-Z_][A-Z0-9_]*$')
    fail_msg: >-
      openclaw_external_provider_api_key_env must be a valid environment variable name.
  when: not (openclaw_use_local_backend | bool)

- name: Ensure OpenClaw prerequisites are installed
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
  become: true

- name: Ensure Hailo Ollama service is active
  ansible.builtin.systemd:
    name: "{{ hailo_ollama_service_name }}"
    enabled: true
    state: started
  when: openclaw_use_local_backend | bool
  become: true

- name: Install sanitizer proxy script from project
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../hailo-sanitize-proxy.py"
    dest: "{{ hailo_proxy_script_path }}"
    mode: "0755"
  when: openclaw_use_local_backend | bool and use_sanitizer_proxy | bool
  become: true

- name: Install managed sanitizer proxy systemd unit
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ hailo_proxy_service_name }}.service"
    mode: "0644"
    content: |
      [Unit]
      Description=Hailo sanitize proxy
      After=network-online.target {{ hailo_ollama_service_name }}.service
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ openclaw_user }}
      Group={{ openclaw_user }}
      Environment=HOME={{ openclaw_user_home }}
      Environment=HAILO_MODEL={{ openclaw_selected_model }}
      ExecStart=/usr/bin/python3 {{ hailo_proxy_script_path }}
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  when: openclaw_use_local_backend | bool and use_sanitizer_proxy | bool
  register: openclaw_proxy_unit_file
  become: true

- name: Check whether managed sanitizer proxy service unit exists
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ hailo_proxy_service_name }}.service"
  register: openclaw_proxy_unit

- name: Ensure sanitizer proxy service is active when enabled
  ansible.builtin.systemd:
    name: "{{ hailo_proxy_service_name }}"
    enabled: true
    daemon_reload: true
    state: "{{ 'restarted' if (openclaw_proxy_unit_file.changed | default(false)) else 'started' }}"
  when: openclaw_use_local_backend | bool and use_sanitizer_proxy | bool
  become: true

- name: Ensure sanitizer proxy service is disabled when not enabled
  ansible.builtin.systemd:
    name: "{{ hailo_proxy_service_name }}"
    enabled: false
    state: stopped
  when:
    - not (openclaw_use_local_backend | bool and use_sanitizer_proxy | bool)
    - openclaw_proxy_unit.stat.exists
  become: true

- name: Check whether OpenClaw CLI is already installed
  ansible.builtin.command: which openclaw
  register: openclaw_cli_path
  changed_when: false
  failed_when: false

- name: Install OpenClaw CLI globally with npm
  ansible.builtin.command: npm install -g {{ openclaw_npm_package }}
  when: openclaw_cli_path.rc != 0
  changed_when: true
  become: true

- name: Resolve OpenClaw CLI path
  ansible.builtin.command: which openclaw
  register: openclaw_cli_path_resolved
  changed_when: false

- name: Strip whitespace from OpenClaw CLI path
  ansible.builtin.set_fact:
    openclaw_cli_path_resolved: "{{ openclaw_cli_path_resolved.stdout | trim }}"

- name: Ensure OpenClaw user config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_user_config_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"
  become: true

- name: Ensure OpenClaw auth profile directory exists
  ansible.builtin.file:
    path: "{{ openclaw_auth_profiles_path | dirname }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0755"
  become: true

- name: Write OpenClaw user configuration
  ansible.builtin.copy:
    dest: "{{ openclaw_user_config_path }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
    content: |
      {
        "gateway": {
          "mode": "local"
        },
        "models": {
          "providers": {
            "{{ openclaw_provider_name }}": {
              "baseUrl": "{{ openclaw_provider_base_url }}",
              "apiKey": "{{ openclaw_provider_api_key_ref }}",
              "api": "{{ openclaw_provider_api }}",
              "models": [
                {
                  "id": "{{ openclaw_selected_model }}",
                  "name": "{{ openclaw_selected_model }}",
                  "reasoning": false,
                  "input": ["text"],
                  "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                  "contextWindow": 16000,
                  "maxTokens": 2048
                }
              ]
            }
          }
        },
        "agents": {
          "defaults": {
            "model": {
              "primary": "{{ openclaw_primary_model_ref }}"
            },
            "models": {
              "{{ openclaw_primary_model_ref }}": {
                "streaming": false
              }
            },
            "sandbox": {
              "mode": "workspace",
              "rootPath": "~/.openclaw/workspace"
            }
          }
        },
        "plugins": {
          "allow": ["nextcloud-talk"]
        }
      }
  no_log: true
  become: true

- name: Read OpenClaw user configuration
  ansible.builtin.slurp:
    path: "{{ openclaw_user_config_path }}"
  register: openclaw_user_cfg_content

- name: Verify OpenClaw user provider base URL is configured
  ansible.builtin.assert:
    that:
      - (openclaw_user_cfg_content.content | b64decode) is search(openclaw_provider_base_url)
    fail_msg: OpenClaw user config does not include expected provider URL {{ openclaw_provider_base_url }}.

- name: Verify OpenClaw user primary model is configured
  ansible.builtin.assert:
    that:
      - (openclaw_user_cfg_content.content | b64decode) is search(openclaw_primary_model_ref)
    fail_msg: OpenClaw user config does not include expected primary model {{ openclaw_primary_model_ref }}.

- name: Write OpenClaw auth profiles
  ansible.builtin.copy:
    dest: "{{ openclaw_auth_profiles_path }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
    content: |
      {
        "{{ openclaw_provider_name }}:local": {
          "type": "token",
          "provider": "{{ openclaw_provider_name }}",
          "token": "{{ openclaw_provider_api_key_ref }}"
        },
        "lastGood": {
          "{{ openclaw_provider_name }}": "{{ openclaw_provider_name }}:local"
        }
      }
  no_log: true
  become: true

- name: Ensure system OpenClaw config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_path | dirname }}"
    state: directory
    mode: "0755"
  become: true

- name: Write system OpenClaw provider config
  ansible.builtin.copy:
    dest: "{{ openclaw_config_path }}"
    mode: "0600"
    content: |
      provider:
        name: {{ openclaw_provider_name }}
        base_url: {{ openclaw_provider_base_url }}
        api: {{ openclaw_provider_api }}
        model: {{ openclaw_selected_model }}
        api_key: {{ openclaw_provider_api_key_ref }}
  no_log: true
  become: true

- name: Install OpenClaw systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/openclaw.service
    mode: "0644"
    content: |
      [Unit]
      Description=OpenClaw Gateway
      After=network-online.target{% if openclaw_use_local_backend | bool and use_sanitizer_proxy | bool %} {{ hailo_proxy_service_name }}.service{% endif %}{% if openclaw_use_local_backend | bool %} {{ hailo_ollama_service_name }}.service{% endif %}
      Wants=network-online.target
      {% if openclaw_use_local_backend | bool %}
      Requires={{ hailo_ollama_service_name }}.service
      {% endif %}

      [Service]
      Type=simple
      User={{ openclaw_user }}
      Group={{ openclaw_user }}
      Environment=HOME={{ openclaw_user_home }}
      Environment=OPENCLAW_GATEWAY_PORT={{ openclaw_gateway_port }}
      Environment=OPENCLAW_GATEWAY_BIND={{ openclaw_gateway_bind_host }}
      PassEnvironment={{ openclaw_external_provider_api_key_env }}
      ExecStartPre=/bin/sleep 2
      ExecStart={{ openclaw_cli_path_resolved }} gateway --port {{ openclaw_gateway_port }} --verbose
      Restart=on-failure
      RestartSec=5
      StartLimitInterval=60
      StartLimitBurst=3
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=openclaw

      [Install]
      WantedBy=multi-user.target
  register: openclaw_unit_file
  become: true

- name: Ensure OpenClaw service is enabled and started
  ansible.builtin.systemd:
    name: openclaw
    enabled: true
    daemon_reload: true
    state: "{{ 'restarted' if openclaw_unit_file.changed else 'started' }}"
  become: true

- name: Wait for OpenClaw service to become active
  ansible.builtin.command: systemctl is-active openclaw.service
  register: openclaw_service_active
  changed_when: false
  failed_when: false
  retries: 10
  delay: 2
  until: (openclaw_service_active.stdout | trim) == 'active'
  become: true

- name: Capture OpenClaw service status when not active
  ansible.builtin.command: systemctl status openclaw.service --no-pager -l
  register: openclaw_service_status
  changed_when: false
  failed_when: false
  when: (openclaw_service_active.stdout | trim) != 'active'
  become: true

- name: Capture OpenClaw service logs when not active
  ansible.builtin.command: journalctl -u openclaw.service -n 80 --no-pager
  register: openclaw_service_journal
  changed_when: false
  failed_when: false
  when: (openclaw_service_active.stdout | trim) != 'active'
  become: true

- name: Verify OpenClaw service is active
  ansible.builtin.assert:
    that:
      - (openclaw_service_active.stdout | trim) == 'active'
    fail_msg: |-
      openclaw.service did not reach active state after start/retry.
      systemctl is-active output: {{ openclaw_service_active.stdout | default('') | trim }}
      systemctl status:
      {{ openclaw_service_status.stdout | default('status unavailable') }}
      recent journal:
      {{ openclaw_service_journal.stdout | default('journal unavailable') }}
  become: true

- name: Check OpenClaw provider config file exists
  ansible.builtin.stat:
    path: "{{ openclaw_config_path }}"
  register: openclaw_cfg

- name: Fail if OpenClaw config path does not exist
  ansible.builtin.assert:
    that:
      - openclaw_cfg.stat.exists
    fail_msg: OpenClaw config file was not found at {{ openclaw_config_path }}.

- name: Read OpenClaw config file
  ansible.builtin.slurp:
    path: "{{ openclaw_config_path }}"
  register: openclaw_cfg_content

- name: Verify OpenClaw provider base URL is configured
  ansible.builtin.assert:
    that:
      - (openclaw_cfg_content.content | b64decode) is search(openclaw_provider_base_url)
    fail_msg: OpenClaw provider URL does not match {{ openclaw_provider_base_url }}.

- name: Run OpenClaw doctor verification
  ansible.builtin.command: "{{ openclaw_cli_path_resolved }} doctor"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    HOME: "{{ openclaw_user_home }}"
  changed_when: false

- name: Run OpenClaw status verification
  ansible.builtin.command: "{{ openclaw_cli_path_resolved }} status --all"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    HOME: "{{ openclaw_user_home }}"
  changed_when: false

- name: Run OpenClaw health verification
  ansible.builtin.command: "{{ openclaw_cli_path_resolved }} health"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    HOME: "{{ openclaw_user_home }}"
  changed_when: false
