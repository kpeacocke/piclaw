---
# SPDX-License-Identifier: Apache-2.0
- name: Download Hailo GenAI model-zoo Debian package
  ansible.builtin.get_url:
    url: "{{ hailo_genai_deb_url }}"
    dest: "{{ hailo_genai_deb_file }}"
    checksum: "sha256:{{ hailo_genai_deb_sha256 }}"
    mode: "0644"
  become: true

- name: Install Hailo GenAI model-zoo from Debian package
  ansible.builtin.apt:
    deb: "{{ hailo_genai_deb_file }}"
  become: true

- name: Resolve hailo-ollama binary path
  ansible.builtin.command: command -v hailo-ollama
  register: hailo_ollama_binary_resolved
  changed_when: false

- name: Assert hailo-ollama binary is available
  ansible.builtin.assert:
    that:
      - hailo_ollama_binary_resolved.stdout | length > 0
    fail_msg: hailo-ollama binary was not found on PATH after package installation.

- name: Create hailo-ollama systemd service unit file
  ansible.builtin.copy:
    mode: "0644"
    content: |
      [Unit]
      Description=Hailo Ollama Model Server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ pi_user }}
      Environment=HOME=/home/{{ pi_user }}
      Environment=OLLAMA_HOST={{ hailo_bind_host }}:{{ hailo_port }}
      ExecStart={{ hailo_ollama_binary_resolved.stdout }}
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/hailo-ollama.service
  notify: Reload systemd daemon
  become: true

- name: Ensure Hailo Ollama service is enabled and started
  ansible.builtin.systemd:
    name: "{{ hailo_ollama_service_name }}"
    enabled: true
    state: started
  changed_when: false
  become: true

- name: Wait for Hailo Ollama API readiness
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/version"
    method: GET
    status_code: 200
  register: hailo_version
  retries: 30
  delay: 2
  until: hailo_version.status == 200

- name: Pull selected local model
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/pull"
    method: POST
    body_format: json
    body:
      model: "{{ hailo_model }}"
    status_code: 200
    timeout: 1800
  register: hailo_pull

- name: Verify selected model exists
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/tags"
    method: GET
    return_content: true
    status_code: 200
  register: hailo_tags

- name: Assert selected model is present
  ansible.builtin.assert:
    that:
      - (hailo_tags.json.models | default([]) | map(attribute='name') | list) is contains(hailo_model)
    fail_msg: "Model {{ hailo_model }} was not found in /api/tags."

- name: Perform chat smoke test against local backend
  ansible.builtin.uri:
    url: "http://{{ hailo_bind_host }}:{{ hailo_port }}/api/chat"
    method: POST
    body_format: json
    body:
      model: "{{ hailo_model }}"
      stream: false
      messages:
        - role: user
          content: "Reply with one short sentence confirming readiness."
    status_code: 200
    return_content: true
    timeout: "{{ chat_smoke_timeout_seconds }}"
  register: hailo_chat

- name: Assert chat response contains non-empty content
  ansible.builtin.assert:
    that:
      - (hailo_chat.json.message.content | default('') | trim | length) > 0
    fail_msg: Local backend chat smoke test returned empty content.
