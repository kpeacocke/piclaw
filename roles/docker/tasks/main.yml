# --- 3.3 Install Docker ---------------------------------------------------

- name: Install and configure Docker
  become: true
  block:
    - name: Remove legacy Docker packages
      ansible.builtin.apt:
        name: "{{ docker_legacy_packages }}"
        state: absent
        purge: true

    - name: Install Docker apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Create /etc/apt/keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Add Docker apt repository (DEB822 format)
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/debian
        suites: "{{ ansible_distribution_release }}"
        components: stable
        signed_by: /etc/apt/keyrings/docker.asc
        state: present
      register: docker_repo

    - name: Update apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true
      when: docker_repo.changed

    - name: Install Docker CE packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present

- name: Ensure Docker service is enabled and started
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: Add configured users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  become: true

- name: Verify Docker is operational
  ansible.builtin.command: docker run --rm hello-world
  changed_when: false
  become: true

# --- 3.4 Open WebUI (optional) -------------------------------------------

- name: Manage Open WebUI when enabled
  ansible.builtin.include_tasks: open_webui.yml
  when: install_open_webui | bool
