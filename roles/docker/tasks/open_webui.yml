---
# SPDX-License-Identifier: Apache-2.0
- name: Pull Open WebUI image
  community.docker.docker_image:
    name: "{{ open_webui_image }}"
    source: pull
  become: true

- name: Deploy Open WebUI container
  community.docker.docker_container:
    name: "{{ open_webui_container_name }}"
    image: "{{ open_webui_image }}"
    state: started
    restart_policy: always
    network_mode: host
    env:
      OLLAMA_BASE_URL: "{{ hailo_ollama_base_url }}"
    volumes:
      - "{{ open_webui_data_volume }}:/app/backend/data"
  become: true

- name: Wait for Open WebUI to become ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ open_webui_port }}"
    method: GET
    status_code: 200
  register: open_webui_ready
  retries: "{{ open_webui_ready_retries }}"
  delay: "{{ open_webui_ready_delay }}"
  until: open_webui_ready.status == 200
