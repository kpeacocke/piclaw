name: devcontainer-smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - .devcontainer/**
      - requirements-dev.txt
      - collections/requirements.yml
      - .github/workflows/devcontainer-smoke.yml
  push:
    branches:
      - main
    paths:
      - .devcontainer/**
      - requirements-dev.txt
      - collections/requirements.yml
      - .github/workflows/devcontainer-smoke.yml

permissions:
  contents: read

concurrency:
  group: devcontainer-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build container and validate toolchain
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3.1900000417
        with:
          runCmd: |
            bash .devcontainer/post-create.sh
            gh --version | head -n 1
            ansible --version | head -n 1
            ansible-lint --version | head -n 1
            molecule --version | head -n 1
            pytest --version
            snyk --version
            sonar-scanner --version | head -n 1
