name: Bug report
description: Report a reproducible problem.
title: "bug: <short description>"
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact playbook command and the task name that failed.
      placeholder: |
        ansible-playbook playbooks/bootstrap.yml -l pi5
        # failing task: ...
    validations:
      required: true

  - type: dropdown
    id: playbook
    attributes:
      label: Affected playbook
      options:
        - bootstrap.yml
        - openclaw.yml
        - verify.yml
        - Other / unknown
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      description: Did this work in a previous version?
      options:
        - "Yes — it worked before"
        - "No — first time trying"
        - Unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Pi model: Raspberry Pi 5
        OS: Raspberry Pi OS Trixie 64-bit
        AI HAT: AI HAT+ 2 (Hailo-10H)
        ansible-core version: (ansible --version)
        openclaw version: (openclaw --version)
        node version: (node --version)
        repo git ref: (git rev-parse --short HEAD)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste the failing task output. Redact any private host details.
      render: shell

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: Hardware is confirmed seated and PSU is stable
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
