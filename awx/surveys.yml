---
surveys:
  bootstrap:
    name: piclaw-bootstrap-survey
    description: Runtime variables for bootstrap execution
    questions: []

  openclaw:
    name: piclaw-openclaw-survey
    description: Runtime variables for model, provider, and secrets
    questions:
      - variable: hailo_model
        type: text
        question: Hailo model tag
        required: true
        default: qwen2:1.5b
      - variable: use_sanitizer_proxy
        type: multiplechoice
        question: Enable sanitizer proxy
        required: true
        choices:
          - "true"
          - "false"
        default: "true"
      - variable: vault_openclaw_admin_password
        type: password
        question: OpenClaw admin password
        required: true
      - variable: vault_optional_api_token
        type: password
        question: Optional upstream API token
        required: false
        default: ""

  verify:
    name: piclaw-verify-survey
    description: Runtime controls for verification timeout
    questions:
      - variable: chat_smoke_timeout_seconds
        type: integer
        question: Chat smoke test timeout seconds
        required: true
        default: 45
