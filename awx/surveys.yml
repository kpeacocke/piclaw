---
surveys:
  bootstrap:
    name: piclaw-bootstrap-survey
    description: Runtime variables for bootstrap execution
    questions: []

  openclaw:
    name: piclaw-openclaw-survey
    description: Runtime variables for profile, model, and provider routing
    questions:
      - variable: openclaw_profile
        type: multiplechoice
        question: OpenClaw profile
        required: true
        choices:
          - local-safe
          - external-power
        default: local-safe
      - variable: hailo_model
        type: text
        question: Hailo model tag
        required: true
        default: qwen2:1.5b
      - variable: use_sanitizer_proxy
        type: multiplechoice
        question: Enable sanitizer proxy
        required: true
        choices:
          - "true"
          - "false"
        default: "true"
      - variable: openclaw_external_provider_name
        type: text
        question: External provider name (used by external-power)
        required: false
        default: custom
      - variable: openclaw_external_provider_base_url
        type: text
        question: External provider base URL (used by external-power)
        required: false
        default: ""
      - variable: openclaw_external_provider_api
        type: text
        question: External provider API type (used by external-power)
        required: false
        default: openai-completions
      - variable: openclaw_external_provider_model
        type: text
        question: External provider model (used by external-power)
        required: false
        default: gpt-4.1-mini
      - variable: openclaw_external_provider_api_key_env
        type: text
        question: External provider API key env var name (used by external-power)
        required: false
        default: OPENCLAW_EXTERNAL_PROVIDER_API_KEY

  verify:
    name: piclaw-verify-survey
    description: Runtime controls for verification timeout
    questions:
      - variable: chat_smoke_timeout_seconds
        type: integer
        question: Chat smoke test timeout seconds
        required: true
        default: 45
