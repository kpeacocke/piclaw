pi_user: pi

use_sanitizer_proxy: true
claw_flavor: openclaw

hailo_model: qwen2:1.5b
hailo_bind_host: 127.0.0.1
hailo_port: 8000
proxy_port: 8081

openclaw_provider_base_url: >-
  {{ 'http://127.0.0.1:' ~ proxy_port ~ '/v1' if use_sanitizer_proxy else 'http://127.0.0.1:' ~ hailo_port ~ '/v1' }}

# Override if your OpenClaw install writes config elsewhere.
openclaw_config_path: /etc/openclaw/config.yml

# Hailo GenAI / model-zoo package controls.
hailo_genai_package: hailo-genai-model-zoo
hailo_genai_package_version: ""

hailo_ollama_service_name: hailo-ollama
hailo_proxy_service_name: hailo-sanitize-proxy

# OpenClaw installer source.
openclaw_installer_repo: https://github.com/sanchorelaxo/openclaw-raspberry-installer.git
openclaw_installer_dest: /opt/openclaw-raspberry-installer

# Validation behavior.
chat_smoke_timeout_seconds: 45
