---
dependency:
  name: galaxy

driver:
  name: default

platforms:
  - name: instance

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml

scenario:
  name: default
  # Full converge/verify is not possible in CI — this repo targets physical hardware (Pi 5 + Hailo).
  # The test_sequence runs dependency resolution, lint, and syntax checks as meaningful CI gates.
  test_sequence:
    - dependency
    - lint
    - syntax
