---
dependency:
  name: galaxy

driver:
  name: default

platforms:
  - name: instance

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml

scenario:
  name: default
  # Full converge/verify is not possible in CI because this repo targets physical hardware.
  # The scenario therefore validates dependency wiring and Ansible syntax only.
  test_sequence:
    - dependency
    - syntax
